# Moved out of CI on 2026-04-21 because:
#   - Requires GitHub Secrets configuration (HUBSPOT_TOKEN, HUBSPOT_PORTAL_ID,
#     HUBSPOT_REGION, SMOKE_DOMAIN) — deferred per docs/roadmap.md (v2.0)
#   - End-to-end deployment testing is being done manually per-project
#     at this stage
#   - A proper skill-driven e2e test (spinning up isolated HubSpot sandbox +
#     GA4 test property + optional test GitHub repo) is the intended future
#     replacement — see docs/roadmap.md (v2.2)
#
# Before reinstating, update:
#   - Config format: currently writes the old flat KEYCHAIN_PREFIX layout
#     (line "KEYCHAIN_PREFIX=\"smoke\"") — needs migrating to the two-tier
#     config hierarchy per docs/superpowers/plans/2026-04-20-account-config-hierarchy.md
#   - Consider switching from a real portal to a HubSpot sandbox/dev account
#
# Original workflow below:
