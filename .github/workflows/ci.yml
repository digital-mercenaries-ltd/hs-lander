# .github/workflows/ci.yml
# Runs on every push and PR: lint, build test, terraform plan test.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: shellcheck scripts/*.sh tests/*.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt
        run: |
          terraform -chdir=terraform/modules/account-setup fmt -check
          terraform -chdir=terraform/modules/landing-page fmt -check

      - name: Terraform validate (account-setup)
        run: |
          terraform -chdir=terraform/modules/account-setup init -backend=false
          terraform -chdir=terraform/modules/account-setup validate

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test-build.sh
        run: bash tests/test-build.sh

  plan-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Run test-terraform-plan.sh
        run: bash tests/test-terraform-plan.sh

  post-apply-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test-post-apply.sh
        run: bash tests/test-post-apply.sh

  preflight-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test-preflight.sh
        run: bash tests/test-preflight.sh

  prescaffold-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test-accounts-list.sh
        run: bash tests/test-accounts-list.sh

      - name: Run test-accounts-describe.sh
        run: bash tests/test-accounts-describe.sh

      - name: Run test-projects-list.sh
        run: bash tests/test-projects-list.sh

      - name: Run test-init-project-pointer.sh
        run: bash tests/test-init-project-pointer.sh

      - name: Run test-scaffold-project.sh
        run: bash tests/test-scaffold-project.sh
